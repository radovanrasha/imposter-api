name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t imposter-api:latest .

      - name: Save Docker image
        run: docker save imposter-api:latest | gzip > imposter-api.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: imposter-api.tar.gz
          target: /tmp/imposter-api.tar.gz
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            docker load < /tmp/imposter-api.tar.gz
            docker stop imposter-api || true
            docker rm imposter-api || true
            docker run -d \
              --name imposter-api \
              --restart unless-stopped \
              -p 127.0.0.1:4000:4000 \
              -e PORT=4000 \
              -e GIN_MODE=release \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              imposter-api:latest
            rm /tmp/imposter-api.tar.gz
